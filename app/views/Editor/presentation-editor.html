<!DOCTYPE html>

    <style>
        /* FULLSCREEN MODAL (from presentation_editor_4tabs.html) */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .popup-overlay.active {
            display: flex;
        }

        .editor-popup {
            width: 98vw;
            height: 95vh;
            background: #2e2e2e;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        // Show loading indicator
        function showLoading(message = "Processing...") {
            const statusBar = document.querySelector(".status-left");
            if (statusBar) {
                const statusSpan = statusBar.querySelector("span:last-child") || document.createElement("span");
                statusSpan.textContent = message;
                statusSpan.style.marginLeft = "20px";
                statusSpan.style.color = "#666";
                if (!statusBar.contains(statusSpan)) {
                    statusBar.appendChild(statusSpan);
                }
            }
        }

        // Hide loading indicator
        function hideLoading() {
            const statusBar = document.querySelector(".status-left");
            if (statusBar) {
                const statusSpan = statusBar.querySelector("span:last-child");
                if (statusSpan && statusSpan.style.marginLeft === "20px") {
                    statusSpan.textContent = "";
                }
            }
        }

        // Show status message
        function showStatus(message, isError = false) {
            const statusBar = document.querySelector(".status-left");
            if (statusBar) {
                const statusSpan = statusBar.querySelector("span:last-child") || document.createElement("span");
                statusSpan.textContent = message;
                statusSpan.style.marginLeft = "20px";
                statusSpan.style.color = isError ? "#d32f2f" : "#2e7d32";
                if (!statusBar.contains(statusSpan)) {
                    statusBar.appendChild(statusSpan);
                }
                setTimeout(() => {
                    statusSpan.textContent = "";
                    statusSpan.style.color = "#666";
                }, 5000);
            }
        }

        // Save slides function
        async function saveSlides() {
            // Get the canvas container
            const canvas = document.querySelector(".canvas");

            if (!canvas) {
                showStatus("No canvas found to save", true);
                return false;
            }

            // Get the complete HTML from canvas innerHTML (like ppt-edit.html does)
            const updatedSlides = document.getElementById("pptContent").innerHTML;

            try {
                showLoading("Saving changes...");

                const saveResponse = await fetch("/api/slides/saveSlides", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        updatedSlides: [updatedSlides],
                        fileName: currentFileName
                    }),
                });

                if (!saveResponse.ok) {
                    const errorData = await saveResponse.json();
                    throw new Error(`Server returned ${saveResponse.status}: ${errorData.error || JSON.stringify(errorData)}`);
                }

                currentHtmlSlides = updatedSlides;
                showStatus("Slides saved successfully");
                return true;
            } catch (error) {
                showStatus(`Failed to save slides: ${error.message}`, true);
                return false;
            } finally {
                hideLoading();
            }
        }

        // Convert to PPTX function
        async function convertToPPTX() {
            if (!currentFileName) {
                showStatus("No file loaded. Please open a PPTX file first.", true);
                return;
            }

            if (await saveSlides()) {
                try {
                    showLoading("Converting to PPTX...");

                    const response = await fetch('/api/slides/convertToPPTX', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            html: currentHtmlSlides,
                            fileName: currentFileName.replace(".pptx", "-converted.pptx")
                        }),
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Server returned ${response.status}: ${errorText}`);
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = currentFileName.replace(".pptx", "-converted.pptx");
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);

                    showStatus("PPTX downloaded successfully");
                } catch (error) {
                    showStatus(`Failed to convert HTML to PPTX: ${error.message}`, true);
                } finally {
                    hideLoading();
                }
            }
        }

        // Download HTML function
        async function downloadHTML() {
            if (!currentFileName) {
                showStatus("No file loaded. Please open a PPTX file first.", true);
                return;
            }

            if (await saveSlides()) {
                try {
                    showLoading("Preparing HTML download...");

                    const response = await fetch(`/api/slides/downloadHTML?fileName=${encodeURIComponent(currentFileName.replace(".pptx", ".html"))}`);

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Server returned ${response.status}: ${errorText}`);
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = currentFileName.replace(".pptx", ".html");
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);

                    showStatus("HTML file downloaded successfully");
                } catch (error) {
                    showStatus(`Failed to download HTML: ${error.message}`, true);
                } finally {
                    hideLoading();
                }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const listContainer = document.getElementById("pptxList");
            const popup = document.getElementById("editorPopup");
            const content = document.getElementById("pptContent");
            const parking = document.getElementById("editorParking");

            const convertToPptxButton = document.getElementById("convertToPptx");
            // const downloadHtmlButton = document.getElementById("downloadHtml");
            // const saveChangesButton = document.getElementById("saveChanges");
            const loader = document.getElementById("loader");
            const statusMessage = document.getElementById("statusMessage");

            let currentHtmlSlides = "";
            let currentFileName = "";

            /* ---------------- Loader & Status ---------------- */

            function showLoading(message = "Processing...") {
                loader.style.display = "inline-block";
                statusMessage.textContent = message;
                convertToPptxButton.disabled = true;
                // downloadHtmlButton.disabled = true;
                // saveChangesButton.disabled = true;
            }

            function hideLoading() {
                loader.style.display = "none";
                statusMessage.textContent = "";
                convertToPptxButton.disabled = false;
                // downloadHtmlButton.disabled = false;
                // saveChangesButton.disabled = false;
            }

            function showStatus(message, isError = false) {
                statusMessage.textContent = message;
                statusMessage.style.color = isError ? "#d32f2f" : "#2e7d32";
                setTimeout(() => {
                    statusMessage.textContent = "";
                    statusMessage.style.color = "#666";
                }, 5000);
            }

            /* ---------------- Load PPT ---------------- */

            pptFileList.forEach((fileUrl) => {
                const fileName = fileUrl.split("/").pop().replace(".pptx", "");
                const li = document.createElement("li");
                li.textContent = fileName.replace(/-/g, " ");
                li.style.cursor = "pointer";

                li.onclick = async () => {
                    currentFileName = fileUrl.split("/").pop();
                    showLoading("Loading presentation...");

                    try {
                        const res = await fetch("/api/slides/upload", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ filePath: fileUrl })
                        });

                        if (!res.ok) throw new Error(await res.text());

                        const json = await res.json();
                        currentHtmlSlides = json.slides.join("\n");

                        // Move editor DOM into popup
                        const editor = parking.querySelector(".editor-container");
                        if (editor) {
                            content.innerHTML = "";
                            content.appendChild(editor);
                        }

                        // Inject slides
                        const canvas = document.querySelector(".canvas");
                        if (canvas) canvas.innerHTML = currentHtmlSlides;

                        // Re-init editor interactions
                        if (window.editor?.setupTextBoxInteractions) {
                            window.editor.setupTextBoxInteractions();
                        }

                        // ✅ Generate slide previews in sidebar
                        if (window.editor?.generateSlidePreviews) {
                            setTimeout(() => window.editor.generateSlidePreviews(), 100);
                        }

                        // ✅ CRITICAL: Save initial state after slides are loaded
                        if (window.editor?.saveInitialState) {
                            setTimeout(() => window.editor.saveInitialState(), 50);
                        }
                        popup.classList.add("active");
                        showStatus("Presentation loaded successfully");
                    } catch (err) {
                        // console.error(err);
                        showStatus(`Failed to load presentation: ${err.message}`, true);
                    } finally {
                        hideLoading();
                    }
                };

                listContainer.appendChild(li);
            });

            /* ---------------- Save Slides ---------------- */

            async function saveSlides() {
                try {
                    showLoading("Saving changes...");

                    const updatedSlides = document.querySelector(".canvas")?.innerHTML || "";

                    const res = await fetch("/api/slides/saveSlides", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            updatedSlides: [updatedSlides],
                            fileName: currentFileName
                        })
                    });

                    if (!res.ok) throw new Error(await res.text());

                    currentHtmlSlides = updatedSlides;
                    showStatus("Slides saved successfully");
                    return true;
                } catch (err) {
                    // console.error(err);
                    showStatus(`Failed to save slides: ${err.message}`, true);
                    return false;
                } finally {
                    hideLoading();
                }
            }

            // saveChangesButton.onclick = saveSlides;

            /* ---------------- Convert to PPTX ---------------- */

            convertToPptxButton.onclick = async () => {
                if (!(await saveSlides())) return;

                try {
                    showLoading("Converting to PPTX...");

                    const res = await fetch("/api/slides/convertToPPTX", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            html: currentHtmlSlides,
                            fileName: currentFileName.replace(".pptx", "-converted.pptx")
                        })
                    });

                    if (!res.ok) throw new Error(await res.text());

                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = currentFileName.replace(".pptx", "-converted.pptx");
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);

                    showStatus("PPTX downloaded successfully");
                } catch (err) {
                    // console.error(err);
                    showStatus(`Failed to convert PPTX: ${err.message}`, true);
                } finally {
                    hideLoading();
                }
            };

            /* ---------------- Download HTML ---------------- */

            // downloadHtmlButton.onclick = async () => {
            //     if (!(await saveSlides())) return;

            //     try {
            //         showLoading("Preparing HTML download...");

            //         const res = await fetch(
            //             `/api/slides/downloadHTML?fileName=${encodeURIComponent(
            //                 currentFileName.replace(".pptx", ".html")
            //             )}`
            //         );

            //         if (!res.ok) throw new Error(await res.text());

            //         const blob = await res.blob();
            //         const url = URL.createObjectURL(blob);
            //         const a = document.createElement("a");
            //         a.href = url;
            //         a.download = currentFileName.replace(".pptx", ".html");
            //         document.body.appendChild(a);
            //         a.click();
            //         a.remove();
            //         URL.revokeObjectURL(url);

            //         showStatus("HTML file downloaded successfully");
            //     } catch (err) {
            //         // console.error(err);
            //         showStatus(`Failed to download HTML: ${err.message}`, true);
            //     } finally {
            //         hideLoading();
            //     }
            // };

            /* ---------------- Popup Close ---------------- */

            popup.addEventListener("click", (e) => {
                if (e.target === popup) popup.classList.remove("active");
            });
        });

        // User-edited closeEditor (kept exactly)
        function closeEditor() {
            const popup = document.getElementById("editorPopup");
            popup.classList.remove("active");

            // clean DOM but DO NOT reload scripts
            const mount = document.getElementById("pptContent");
            const parking = document.getElementById("editorParking");

            // Move editor back to parking so it remains initialized
            const editor = mount.querySelector(".editor-container");
            if (editor) parking.appendChild(editor);

            mount.innerHTML = "";
        }
    </script>
